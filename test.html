<!DOCTYPE html>
<html>
    <head>
        <script src="/js/lib/jquery.js"></script>
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <style>
        * {
          box-sizing: border-box;
        }

        #myInput {
          background-image: url('/css/searchicon.png');
          background-position: 10px 12px;
          background-repeat: no-repeat;
          width: 100%;
          font-size: 16px;
          padding: 12px 20px 12px 40px;
          border: 1px solid #ddd;
          margin-bottom: 12px;
        }

        #myUL {
          list-style-type: none;
          padding: 0;
          margin: 0;
        }

        #myUL li a {
          border: 1px solid #ddd;
          margin-top: -1px; /* Prevent double borders */
          background-color: #f6f6f6;
          padding: 12px;
          text-decoration: none;
          font-size: 18px;
          color: black;
          display: block
        }

        #myUL li a:hover:not(.header) {
          background-color: #eee;
        }
        </style>
    </head>





    <body>

        <h2>My Phonebook</h2>

        <!-- <input type="text" id="myInput" onkeyup="myFunction()" placeholder="Search for names.." title="Type in a name"> -->
        <ul id="contentFilterList">
            <li><input type="checkbox" class="contentFilterChbox" name="contentFilterA" 
                id="cf-cat-vidya" onclick="updateFilter()" checked>
                 Video games
            </li>
            <li><input type="checkbox" class="contentFilterChbox" name="contentFilterA" 
                id="cf-cat-board" onclick="updateFilter()" checked>
                 Board games
            </li>
            <li><input type="checkbox" class="contentFilterChbox" name="contentFilterA" 
                id="cf-cat-tech" onclick="updateFilter()" checked>
                 Tech projects
            </li>
            <li>---</li>
            <li><input type="checkbox" class="contentFilterChbox" name="contentFilterB" 
                id="cf-status-finished" onclick="updateFilter()" checked>
                 Finished
            </li>
            <li><input type="checkbox" class="contentFilterChbox" name="contentFilterB" 
                id="cf-status-prototype" onclick="updateFilter()" checked>
                 Prototype
            </li>
        </ul>
        <br><br><br>

        <ul id="myUL">
          <li id="cf-cat-vidya cf-status-prototype"><a href="#">Acting, Thinking, Feeling</a></li>
          <li id="cf-cat-vidya cf-status-finished"><a href="#">Funny Monkey Game</a></li>

          <li id="cf-cat-tech cf-status-finished"><a href="#">HydroBuddy</a></li>
          <li id="cf-cat-tech cf-status-prototype"><a href="#">Celestial Connection</a></li>
          
          <li id="cf-cat-board cf-status-prototype"><a href="#">Health Point</a></li>
        </ul>

        <script>
            let filterGroupA = [];
            let filterGroupB = [];
            let filterGroupC = [];

            function updateFilter() {
                var cflist, chboxes, filter, chboxName;
                cflist = document.getElementById("contentFilterList");
                chboxes = cflist.getElementsByTagName("input");

                filterGroupA = [];
                filterGroupB = [];
                filterGroupC = [];
                for ( i = 0; i < chboxes.length; i++ ) {
                    filter = chboxes[i].id
                    if ( chboxes[i].checked ) {
                        chboxName = chboxes[i].name

                        if ( chboxName == "contentFilterA" ) {
                            filterGroupA.push( filter )
                        }
                        else if ( chboxName == "contentFilterB" ) {
                            filterGroupB.push( filter )
                        }
                        else if ( chboxName == "contentFilterC" ) {
                            filterGroupC.push( filter )
                        }
                    }
                }

                applyFilter()
            }

            function applyFilter() {
                var ul, li, filter;
                ul = document.getElementById("myUL");
                tiles = ul.getElementsByTagName("li");

                for ( i = 0; i < tiles.length; i++ ) {
                    var tile = tiles[i]
                    var tile_ids = tile.id

                    var passedFilterA = false
                    if ( filterGroupA.length > 0 ) {
                        for ( a = 0; a < filterGroupA.length; a++ ) {

                            filter = filterGroupA[a]
                            if ( tile_ids.includes( filter ) ) {
                                passedFilterA = true
                            }
                        }
                    }

                    var passedFilterB = false
                    if ( filterGroupB.length > 0 ) {
                        for ( b = 0; b < filterGroupB.length; b++ ) {

                            filter = filterGroupB[b]
                            if ( tile_ids.includes( filter ) ) {
                                passedFilterB = true
                            }
                        }
                    }

                    if ( passedFilterA && passedFilterB ) {
                        showTile( tile )
                    } else {
                        hideTile( tile )
                    }
                }
            }

            function hideTile( tile ) {
                tile.style.display = "none";
            }

            function showTile( tile ) {
                tile.style.display = "block";
            }

            function myFunction() {
                var input, filter, ul, li, a, i, txtValue;
                input = document.getElementById("myInput");
                filter = input.value.toUpperCase();
                ul = document.getElementById("myUL");
                li = ul.getElementsByTagName("li");
                for (i = 0; i < li.length; i++) {
                    a = li[i].getElementsByTagName("a")[0];
                    txtValue = a.textContent || a.innerText;
                    if (txtValue.toUpperCase().indexOf(filter) > -1) {
                        li[i].style.display = "";
                    } else {
                        li[i].style.display = "none";
                    }
                }
            }

        </script>

      <script src="/js/on-page-load.js"></script>
</body>

</html>
